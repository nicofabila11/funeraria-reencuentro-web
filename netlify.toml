[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Atajos para el OAuth proxy (Decap/Sveltia CMS)
[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/auth/callback"
  to = "/.netlify/functions/callback"
  status = 200
